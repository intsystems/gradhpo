name: lint
on: [push, pull_request, workflow_dispatch]

jobs:
  flake8:
    name: flake8 (PEP-8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        run: flake8 src/gradhpo tests
