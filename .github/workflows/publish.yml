name: publish

# Publishes the gradhpo package to PyPI when a version tag (v*.*.*) is pushed,
# or to TestPyPI on manual workflow_dispatch with environment=test.
#
# Authentication uses PyPI's *trusted publishers* / OIDC — no long-lived API
# token is stored in repository secrets. To enable:
#   1. Create the project on PyPI (one-time, after the first manual upload).
#   2. On https://pypi.org/manage/project/gradhpo/settings/publishing/ add a
#      pending publisher with:
#        owner       = intsystems
#        repository  = gradhpo
#        workflow    = publish.yml
#        environment = pypi
#   3. Repeat on https://test.pypi.org/manage/.../publishing/ with
#      environment = testpypi.
# OIDC publishing requires the ``id-token: write`` permission below.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      target:
        description: 'Where to publish'
        required: true
        default: 'testpypi'
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build distributions
        working-directory: src
        run: python -m build --sdist --wheel --outdir ../dist

      - name: List built artifacts
        run: ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi' }}
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/gradhpo
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: >-
      ${{ github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi') }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gradhpo
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
